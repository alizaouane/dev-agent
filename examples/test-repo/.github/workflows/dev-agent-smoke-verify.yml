name: dev-agent · smoke-verify

on:
  workflow_dispatch:
    inputs:
      issue_number:
        required: true
        type: number
      smoke_phase:
        required: true
        type: string
      smoke_output:
        required: true
        type: string
      smoke_exit_code:
        required: true
        type: number

jobs:
  smoke-verify:
    uses: ./.github/workflows/phase-smoke-verify.yml
    with:
      issue_number: ${{ inputs.issue_number }}
      smoke_phase: ${{ inputs.smoke_phase }}
      smoke_output: ${{ inputs.smoke_output }}
      smoke_exit_code: ${{ inputs.smoke_exit_code }}
      invocation_mode: stub
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
