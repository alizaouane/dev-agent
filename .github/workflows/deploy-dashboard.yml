name: Deploy dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'lib/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - 'dashboard/**'
      - 'lib/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck --workspace=dashboard
      - name: Test
        run: npm run test --workspace=dashboard

