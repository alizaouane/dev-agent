name: dev-agent · phase-promote-to-prod

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: number
      config_path:
        required: false
        type: string
        default: '.dev-agent.yml'
      invocation_mode:
        required: false
        type: string
        default: 'stub'
    secrets:
      ANTHROPIC_API_KEY:
        required: false
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number'
        required: true
        type: number
      config_path:
        description: 'Path to .dev-agent.yml'
        required: false
        type: string
        default: 'examples/test-repo/.dev-agent.yml'
      invocation_mode:
        description: 'stub or live'
        required: false
        type: string
        default: 'stub'

jobs:
  promote-to-prod:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
      issues: write
    steps:
      # Pillar 5 — Harden runner against unexpected egress + sudo. See
      # phase-bug-scout.yml for the v1 audit-mode rationale.
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
      - uses: actions/checkout@v4
      - name: Checkout dev-agent engine
        uses: actions/checkout@v4
        with:
          repository: alizaouane/dev-agent
          ref: ${{ github.workflow_sha }}
          path: .dev-agent-engine
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Install engine deps
        working-directory: .dev-agent-engine
        run: npm ci

      - name: Run prod promote chain (stub)
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          MODEL: claude-sonnet-4-6
          INVOCATION_MODE: ${{ inputs.invocation_mode }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONFIG_PATH: ${{ inputs.config_path }}
          MERGE_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export PROMPT_VARS_JSON=$(jq -nc \
            --argjson skills "$(jq -c '.deploy_skills.prod' "$CONFIG_PATH")" \
            --arg target "$(jq -r '.branches.release_target' "$CONFIG_PATH")" \
            --arg test "$(jq -r '.commands.test' "$CONFIG_PATH")" \
            --arg sha "$MERGE_SHA" \
            '{deploy_skills:{prod:$skills}, branches:{release_target:$target}, commands:{test:$test}, merge_sha:$sha}')
          .dev-agent-engine/node_modules/.bin/tsx .dev-agent-engine/lib/cli/render-and-run.ts promote-to-prod > result.json
          MODEL=$(jq -r '.model' result.json)
          BODY=$(printf '🤖 Phase: promote-to-prod\nModel: %s\nMode: %s\nStatus: stub-success (live wiring in 1d)\n' "$MODEL" "$INVOCATION_MODE")
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"

      - name: Append SESSION_LOG.md entry
        if: always() && inputs.invocation_mode == 'live'
        env:
          PHASE: promote-to-prod
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          OUTCOME: success
          TRIGGER: 'Staging → release_target promotion approved by user.'
          NEXT_SESSION_HINT: 'manual smoke on production once the promote PR merges and the deploy completes.'
        run: |
          set -euo pipefail
          .dev-agent-engine/node_modules/.bin/tsx .dev-agent-engine/lib/cli/append-session-log.ts
          if git diff --quiet -- SESSION_LOG.md; then
            echo "SESSION_LOG.md unchanged — no commit needed."
            exit 0
          fi
          git config user.name 'dev-agent[bot]'
          git config user.email 'dev-agent@users.noreply.github.com'
          git add SESSION_LOG.md
          git commit -m "chore(dev-agent): session log — promote-to-prod issue #${ISSUE_NUMBER}"
          git push origin HEAD || echo "push failed (likely a protected branch — entry is committed locally; consumer can rebase)"
