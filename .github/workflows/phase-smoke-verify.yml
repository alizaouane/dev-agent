name: dev-agent · phase-smoke-verify

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: number
      smoke_phase:
        required: true
        type: string
      smoke_output:
        required: true
        type: string
      smoke_exit_code:
        required: true
        type: number
      invocation_mode:
        required: false
        type: string
        default: 'stub'
    secrets:
      ANTHROPIC_API_KEY:
        required: false
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number'
        required: true
        type: number
      smoke_phase:
        description: 'staging or prod'
        required: true
        type: string
      smoke_output:
        description: 'captured smoke output'
        required: true
        type: string
      smoke_exit_code:
        description: 'smoke exit code'
        required: true
        type: number
      invocation_mode:
        description: 'stub or live'
        required: false
        type: string
        default: 'stub'

jobs:
  smoke-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      # Pillar 5 — Harden runner against unexpected egress + sudo. See
      # phase-bug-scout.yml for the v1 audit-mode rationale.
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
      - uses: actions/checkout@v4

      # actions/checkout above clones the *consumer's* repo — which has no
      # lib/cli tooling. The reusable-workflow YAML ships from dev-agent but
      # its scripts don't, so check the engine out separately into a subdir
      # (excluded from git state so it can't dirty the consumer's tree).
      # Pinned to the same SHA as the caller's YAML via github.workflow_sha, so the
      # engine scripts always match the YAML revision (no tag-vs-main drift).
      - name: Reserve engine checkout from git state
        run: echo '.dev-agent-engine/' >> .git/info/exclude

      - name: Checkout dev-agent engine
        uses: actions/checkout@v4
        with:
          repository: alizaouane/dev-agent
          ref: ${{ github.workflow_sha }}
          path: .dev-agent-engine

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Install engine deps
        working-directory: .dev-agent-engine
        run: npm ci

      - name: Classify smoke output (stub)
        env:
          MODEL: claude-haiku-4-5
          INVOCATION_MODE: ${{ inputs.invocation_mode }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          SMOKE_PHASE: ${{ inputs.smoke_phase }}
          SMOKE_OUTPUT: ${{ inputs.smoke_output }}
          SMOKE_EXIT_CODE: ${{ inputs.smoke_exit_code }}
        run: |
          set -euo pipefail
          export PROMPT_VARS_JSON=$(jq -nc \
            --arg phase "$SMOKE_PHASE" \
            --arg out "$SMOKE_OUTPUT" \
            --argjson code "$SMOKE_EXIT_CODE" \
            --argjson issue "$ISSUE_NUMBER" \
            '{smoke_phase:$phase, smoke_output:$out, smoke_exit_code:$code, issue_number:$issue}')
          .dev-agent-engine/node_modules/.bin/tsx .dev-agent-engine/lib/cli/render-and-run.ts smoke-verify
