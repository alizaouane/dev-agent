name: dev-agent · phase-implement

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: number
      config_path:
        required: false
        type: string
        default: '.dev-agent.yml'
      invocation_mode:
        required: false
        type: string
        default: 'live'
    secrets:
      ANTHROPIC_API_KEY:
        required: false
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number'
        required: true
        type: number
      config_path:
        description: 'Path to .dev-agent.yml'
        required: false
        type: string
        default: 'examples/test-repo/.dev-agent.yml'
      invocation_mode:
        description: 'live (real claude-code-action) or stub (skip the agent — for tests)'
        required: false
        type: string
        default: 'live'

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      - run: npm ci

      - name: Convert .dev-agent.yml to JSON for jq
        id: cfg
        env:
          CONFIG_PATH: ${{ inputs.config_path }}
        run: |
          set -euo pipefail
          npx tsx lib/cli/config-to-json.ts "$CONFIG_PATH" > /tmp/config.json
          # Sanity check: parse must succeed.
          jq -e . /tmp/config.json > /dev/null

      - name: Read issue
        id: issue
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh issue view "$ISSUE_NUMBER" --json number,title,body,labels > issue.json
          TITLE=$(jq -r '.title' issue.json)
          # Find the linked spec file path. Look in body for a `docs/.../*.md`
          # reference; fall back to the dev-agent.yml's specs_dir + a search
          # for a file matching the issue slug.
          SPECS_DIR=$(jq -r '.artifacts.specs_dir // "docs/specs"' /tmp/config.json)
          SPEC_PATH=$(jq -r '.body' issue.json | grep -oE "${SPECS_DIR}/[^[:space:])\"]+\.md" | head -1 || true)
          if [ -z "$SPEC_PATH" ] || [ ! -f "$SPEC_PATH" ]; then
            SPEC_PATH="${SPECS_DIR}/placeholder-no-spec.md"
            mkdir -p "$SPECS_DIR"
            printf '# (no spec linked)\n\nThe issue body did not reference a spec file under `%s/`. Treat the issue body as the spec.\n' "$SPECS_DIR" > "$SPEC_PATH"
          fi
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "spec_path=$SPEC_PATH" >> "$GITHUB_OUTPUT"

      - name: Render system prompt
        id: prompt
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          SPEC_PATH: ${{ steps.issue.outputs.spec_path }}
        run: |
          set -euo pipefail
          export PROMPT_VARS_JSON=$(jq -nc \
            --arg spec_path "$SPEC_PATH" \
            --arg branch_name "feat/dev-agent-issue-${ISSUE_NUMBER}" \
            --arg test "$(jq -r '.commands.test // "npm test"' /tmp/config.json)" \
            --arg typecheck "$(jq -r '.commands.typecheck // "npm run typecheck"' /tmp/config.json)" \
            --arg lint "$(jq -r '.commands.lint // ""' /tmp/config.json)" \
            --argjson blocked "$(jq -c '.guardrails.blocked_paths // []' /tmp/config.json)" \
            --argjson unlock "$(jq -c '.guardrails.require_explicit_unlock // []' /tmp/config.json)" \
            --argjson maxfiles "$(jq -r '.guardrails.max_files_changed // 30' /tmp/config.json)" \
            --argjson maxlines "$(jq -r '.guardrails.max_lines_changed // 800' /tmp/config.json)" \
            '{spec_path:$spec_path, branch_name:$branch_name, commands:{test:$test, typecheck:$typecheck, lint:(if ($lint|length) > 0 then $lint else null end)}, guardrails:{blocked_paths:$blocked, require_explicit_unlock:$unlock, max_files_changed:$maxfiles, max_lines_changed:$maxlines}}')
          # Sanity check: PROMPT_VARS_JSON must be non-empty JSON. jq's
          # `select` filter can silently produce no output, leaving us with
          # an empty string that breaks render-prompt.ts. Fail loudly here.
          if [ -z "$PROMPT_VARS_JSON" ]; then
            echo "::error::PROMPT_VARS_JSON is empty — jq filter produced no output" >&2
            exit 1
          fi
          npx tsx lib/cli/render-prompt.ts implement > /tmp/system-prompt.md

      - name: Build agent prompt (system + spec + issue context)
        id: build
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          SPEC_PATH: ${{ steps.issue.outputs.spec_path }}
        run: |
          set -euo pipefail
          {
            echo "# Implementation task — issue #$ISSUE_NUMBER"
            echo ""
            echo "**Issue title:** $ISSUE_TITLE"
            echo "**Spec file:** \`$SPEC_PATH\`"
            echo ""
            echo "---"
            echo ""
            echo "## Spec content"
            echo ""
            cat "$SPEC_PATH"
            echo ""
            echo "---"
            echo ""
            echo "## Issue body"
            echo ""
            jq -r '.body // ""' issue.json
            echo ""
            echo "---"
            echo ""
            echo "## System / discipline (read carefully)"
            echo ""
            cat /tmp/system-prompt.md
          } > /tmp/agent-prompt.md
          echo "prompt_path=/tmp/agent-prompt.md" >> "$GITHUB_OUTPUT"

      - name: Skip live agent invocation (stub mode)
        if: inputs.invocation_mode == 'stub'
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BODY=$(printf '🤖 Phase: implement\nModel: (none)\nTokens: 0 in / 0 out\nCost: $0\nMode: stub\nStatus: stub-mode (no agent invocation; set invocation_mode=live to ship code)\n')
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"

      - name: Run Claude Code (live agent)
        id: claude
        if: inputs.invocation_mode == 'live'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ steps.build.outputs.prompt_path }}
          # Bash matches all bash commands (the agent needs npm/git/etc).
          # Guardrails (blocked_paths, max_files_changed) are enforced by
          # the rendered prompt, not by tool denylists — the prompt is the
          # contract.
          claude_args: '--max-turns 30 --model claude-sonnet-4-6 --allowedTools Bash Edit Write Read Glob Grep TodoWrite NotebookEdit Task WebFetch WebSearch'
          branch_prefix: 'feat/dev-agent-issue-'
          show_full_output: 'true'

      - name: Comment telemetry + flip state
        id: telemetry
        if: inputs.invocation_mode == 'live'
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH_NAME="feat/dev-agent-issue-${ISSUE_NUMBER}"
          # The agent both pushes the branch and opens the PR (workflow-default
          # GH_TOKEN cannot create PRs unless the repo opts in via "Allow
          # GitHub Actions to create and approve pull requests" — the agent's
          # OIDC token doesn't have that restriction).
          PR_NUMBER=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -z "$PR_NUMBER" ]; then
            BODY=$(printf '🤖 Phase: implement\nModel: claude-sonnet-4-6\nMode: live\nStatus: agent-no-pr (the agent ran but did not open a PR; check logs)\n')
            gh issue comment "$ISSUE_NUMBER" --body "$BODY"
            echo "phase_outcome=blocked" >> "$GITHUB_OUTPUT"
            echo "pr_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BODY=$(printf '🤖 Phase: implement\nModel: claude-sonnet-4-6\nMode: live\nStatus: success\nBranch: %s\nPR: #%s\n' "$BRANCH_NAME" "$PR_NUMBER")
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"
          gh issue edit "$ISSUE_NUMBER" --remove-label state:implementing --add-label state:pr-review || true
          echo "phase_outcome=success" >> "$GITHUB_OUTPUT"
          echo "pr_url=https://github.com/${GITHUB_REPOSITORY}/pull/${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Append SESSION_LOG.md entry
        if: always() && inputs.invocation_mode == 'live'
        env:
          PHASE: implement
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          OUTCOME: ${{ steps.telemetry.outputs.phase_outcome || 'aborted' }}
          PR_URL: ${{ steps.telemetry.outputs.pr_url }}
          NEXT_SESSION_HINT: ${{ steps.telemetry.outputs.phase_outcome == 'success' && 'review the PR against the agreed scope and merge to default branch (= staging) when ready.' || 'inspect the implement-phase logs and decide whether to retry, abandon, or hand-edit the scope.' }}
        run: |
          set -euo pipefail
          npx tsx lib/cli/append-session-log.ts
          if git diff --quiet -- SESSION_LOG.md; then
            echo "SESSION_LOG.md unchanged — no commit needed."
            exit 0
          fi
          git config user.name 'dev-agent[bot]'
          git config user.email 'dev-agent@users.noreply.github.com'
          git add SESSION_LOG.md
          git commit -m "chore(dev-agent): session log — implement issue #${ISSUE_NUMBER}"
          git push origin HEAD || echo "push failed (likely a protected branch — entry is committed locally; consumer can rebase)"
