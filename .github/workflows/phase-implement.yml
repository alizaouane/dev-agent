name: dev-agent · phase-implement

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: number
      config_path:
        required: false
        type: string
        default: '.dev-agent.yml'
      invocation_mode:
        required: false
        type: string
        default: 'live'
    secrets:
      ANTHROPIC_API_KEY:
        required: false
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number'
        required: true
        type: number
      config_path:
        description: 'Path to .dev-agent.yml'
        required: false
        type: string
        default: 'examples/test-repo/.dev-agent.yml'
      invocation_mode:
        description: 'live (real claude-code-action) or stub (skip the agent — for tests)'
        required: false
        type: string
        default: 'live'

jobs:
  implement:
    runs-on: ubuntu-latest
    # Long ceiling so the implement phase can land large multi-step
    # specs without GitHub killing the run mid-edit. Originally 30 min,
    # which truncated runs on real-sized specs.
    timeout-minutes: 360
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      # Pillar 5 — Harden runner against unexpected egress + sudo. v1 ships
      # in audit mode (logs without blocking). Implement legitimately needs
      # the broadest egress (npm, GitHub, claude.ai for the Claude Code CLI
      # installer, api.anthropic.com for model calls) so audit-then-block is
      # especially important here. v1.1 flips to block-mode after audit data.
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
      # Consumer repo at root — agent edits, type-checks, tests against this.
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      # Hide workflow-generated paths from the consumer's git state
      # BEFORE any subsequent step writes to them. Without this, the
      # salvage step's `git add -A` would sweep:
      #   - issue.json (written in-repo by the Read issue step)
      #   - .dev-agent-engine/ (the next step's nested checkout —
      #     would land in the salvage commit as a gitlink/submodule
      #     entry, polluting the consumer's PR)
      # `.git/info/exclude` is per-clone and equivalent to .gitignore
      # for tracking purposes; nothing is committed to the consumer's
      # actual .gitignore.
      - name: Reserve workflow artifacts from agent git state
        run: |
          set -euo pipefail
          {
            echo 'issue.json'
            echo '.dev-agent-engine/'
          } >> .git/info/exclude

      # ACM pre-flight: if phase-acm already ran and pushed the feature
      # branch (with the manifest + stub tests committed), switch to it so
      # the agent sees the locked tests as part of its working tree. When
      # phase-acm is not configured for this consumer, the branch won't
      # exist yet and claude-code-action creates it fresh — the existing
      # flow continues unchanged.
      - name: Prefetch feature branch (for ACM manifest)
        id: prefetch
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          BRANCH_NAME="feat/dev-agent-issue-${ISSUE_NUMBER}"
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            git fetch origin "$BRANCH_NAME"
            git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"
            echo "branch_existed=true" >> "$GITHUB_OUTPUT"
          else
            echo "branch_existed=false" >> "$GITHUB_OUTPUT"
          fi

      # Engine repo (the dev-agent CLIs + prompt templates this workflow
      # invokes via `.dev-agent-engine/node_modules/.bin/tsx ...`). Pinned
      # to v1 so workflow code and CLI code move together.
      - name: Checkout dev-agent engine
        uses: actions/checkout@v4
        with:
          repository: alizaouane/dev-agent
          ref: ${{ github.workflow_sha }}
          path: .dev-agent-engine

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      # Consumer deps so the agent can run lint/test/build against the
      # consumer's package.json.
      - run: npm ci

      # Engine deps (tsx, js-yaml, handlebars, ...) installed in the
      # subdirectory so consumer deps stay clean. CLI binaries land
      # in .dev-agent-engine/node_modules/.bin/.
      - name: Install engine deps
        working-directory: .dev-agent-engine
        run: npm ci

      - name: Convert .dev-agent.yml to JSON for jq
        id: cfg
        env:
          CONFIG_PATH: ${{ inputs.config_path }}
        run: |
          set -euo pipefail
          .dev-agent-engine/node_modules/.bin/tsx .dev-agent-engine/lib/cli/config-to-json.ts "$CONFIG_PATH" > /tmp/config.json
          # Sanity check: parse must succeed.
          jq -e . /tmp/config.json > /dev/null

      - name: Read issue
        id: issue
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh issue view "$ISSUE_NUMBER" --json number,title,body,labels > issue.json
          TITLE=$(jq -r '.title' issue.json)
          # Find the linked spec file path. The previous regex hardcoded
          # the .dev-agent.yml `specs_dir` (default docs/specs) — it
          # missed valid spec references under e.g.
          # docs/superpowers/specs/, leaving the agent to work from a
          # placeholder. Now: try `${SPECS_DIR}/*.md` first (canonical),
          # then fall back to ANY `docs/**/*.md` reference in the body
          # (broad), and only fall back to placeholder if neither
          # exists on disk.
          SPECS_DIR=$(jq -r '.artifacts.specs_dir // "docs/specs"' /tmp/config.json)
          BODY=$(jq -r '.body' issue.json)
          SPEC_PATH=$(printf '%s' "$BODY" | grep -oE "${SPECS_DIR}/[^[:space:])\"\\\`]+\.md" | head -1 || true)
          if [ -z "$SPEC_PATH" ] || [ ! -f "$SPEC_PATH" ]; then
            # Broader fallback: any docs/**/*.md reference in the body.
            SPEC_PATH=$(printf '%s' "$BODY" | grep -oE "docs/[^[:space:])\"\\\`]+\.md" | while read -r p; do [ -f "$p" ] && echo "$p" && break; done || true)
          fi
          if [ -z "$SPEC_PATH" ] || [ ! -f "$SPEC_PATH" ]; then
            SPEC_PATH="${SPECS_DIR}/placeholder-no-spec.md"
            mkdir -p "$SPECS_DIR"
            printf '# (no spec linked)\n\nThe issue body did not reference a spec file under `%s/` or any `docs/**/*.md` path that exists on this branch. Treat the issue body as the spec.\n' "$SPECS_DIR" > "$SPEC_PATH"
          fi
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "spec_path=$SPEC_PATH" >> "$GITHUB_OUTPUT"

      - name: Render system prompt
        id: prompt
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          SPEC_PATH: ${{ steps.issue.outputs.spec_path }}
        run: |
          set -euo pipefail
          export PROMPT_VARS_JSON=$(jq -nc \
            --arg spec_path "$SPEC_PATH" \
            --arg branch_name "feat/dev-agent-issue-${ISSUE_NUMBER}" \
            --argjson issue "$ISSUE_NUMBER" \
            --arg test "$(jq -r '.commands.test // "npm test"' /tmp/config.json)" \
            --arg typecheck "$(jq -r '.commands.typecheck // "npm run typecheck"' /tmp/config.json)" \
            --arg lint "$(jq -r '.commands.lint // ""' /tmp/config.json)" \
            --argjson blocked "$(jq -c '.guardrails.blocked_paths // []' /tmp/config.json)" \
            --argjson unlock "$(jq -c '.guardrails.require_explicit_unlock // []' /tmp/config.json)" \
            --argjson maxfiles "$(jq -r '.guardrails.max_files_changed // 30' /tmp/config.json)" \
            --argjson maxlines "$(jq -r '.guardrails.max_lines_changed // 800' /tmp/config.json)" \
            --argjson auditpre "$(jq -c '.audit_skills.pre_pr // []' /tmp/config.json)" \
            '{spec_path:$spec_path, branch_name:$branch_name, issue_number:$issue, commands:{test:$test, typecheck:$typecheck, lint:(if ($lint|length) > 0 then $lint else null end)}, guardrails:{blocked_paths:$blocked, require_explicit_unlock:$unlock, max_files_changed:$maxfiles, max_lines_changed:$maxlines}, audit_skills:{pre_pr:$auditpre}}')
          # Sanity check: PROMPT_VARS_JSON must be non-empty JSON. jq's
          # `select` filter can silently produce no output, leaving us with
          # an empty string that breaks render-prompt.ts. Fail loudly here.
          if [ -z "$PROMPT_VARS_JSON" ]; then
            echo "::error::PROMPT_VARS_JSON is empty — jq filter produced no output" >&2
            exit 1
          fi
          .dev-agent-engine/node_modules/.bin/tsx .dev-agent-engine/lib/cli/render-prompt.ts implement > /tmp/system-prompt.md

      - name: Build agent prompt (system + spec + issue context)
        id: build
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          SPEC_PATH: ${{ steps.issue.outputs.spec_path }}
        run: |
          set -euo pipefail
          {
            echo "# Implementation task — issue #$ISSUE_NUMBER"
            echo ""
            echo "**Issue title:** $ISSUE_TITLE"
            echo "**Spec file:** \`$SPEC_PATH\`"
            echo ""
            echo "---"
            echo ""
            echo "## Spec content"
            echo ""
            cat "$SPEC_PATH"
            echo ""
            echo "---"
            echo ""
            echo "## Issue body"
            echo ""
            jq -r '.body // ""' issue.json
            echo ""
            echo "---"
            echo ""
            echo "## System / discipline (read carefully)"
            echo ""
            cat /tmp/system-prompt.md
          } > /tmp/agent-prompt.md
          echo "prompt_path=/tmp/agent-prompt.md" >> "$GITHUB_OUTPUT"

      - name: Skip live agent invocation (stub mode)
        if: inputs.invocation_mode == 'stub'
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BODY=$(printf '🤖 Phase: implement\nModel: (none)\nTokens: 0 in / 0 out\nCost: $0\nMode: stub\nStatus: stub-mode (no agent invocation; set invocation_mode=live to ship code)\n')
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"

      # ACM pre-flight (Pillar 1). When phase-acm has run for this issue
      # and pushed `.dev-agent/acm-manifest.json` to the feature branch,
      # the post-agent ACM gate kicks in and the agent's PR-open path is
      # gated on `acm-verify --check-green --check-locks --check-spec-hash`.
      # When phase-acm has NOT run (no manifest on branch — typical for
      # consumers without the audit_skills.acm config), gate_active=false
      # and the existing flow runs unchanged.
      - name: ACM pre-flight (detect manifest)
        id: acm-preflight
        if: inputs.invocation_mode == 'live'
        run: |
          set -euo pipefail
          if [ -f .dev-agent/acm-manifest.json ]; then
            CRITERION_COUNT=$(jq '.criteria | length' .dev-agent/acm-manifest.json)
            echo "gate_active=true" >> "$GITHUB_OUTPUT"
            echo "criterion_count=$CRITERION_COUNT" >> "$GITHUB_OUTPUT"
            echo "ACM gate active — $CRITERION_COUNT criteria locked in manifest."
          else
            echo "gate_active=false" >> "$GITHUB_OUTPUT"
            echo "criterion_count=0" >> "$GITHUB_OUTPUT"
            echo "ACM gate inactive (no manifest on this branch). Existing flow continues."
          fi

      # claude-code-action expects the Claude Code native binary at
      # ~/.local/bin/claude — it doesn't install it itself. Without
      # this step, the action fails with "Claude Code native binary
      # not found at /home/runner/.local/bin/claude". The official
      # installer drops the binary at exactly that path and adds it
      # to PATH for subsequent steps.
      - name: Install Claude Code CLI
        if: inputs.invocation_mode == 'live'
        run: |
          set -euo pipefail
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Claude Code (live agent)
        id: claude
        if: inputs.invocation_mode == 'live'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ steps.build.outputs.prompt_path }}
          # Bash matches all bash commands (the agent needs npm/git/etc).
          # Guardrails (blocked_paths, max_files_changed) are enforced by
          # the rendered prompt, not by tool denylists — the prompt is the
          # contract.
          # max-turns intentionally high — the previous 30-turn cap
          # forced premature exit on multi-step specs. The workflow
          # timeout-minutes ceiling is the real backstop.
          claude_args: '--max-turns 500 --model claude-sonnet-4-6 --allowedTools Bash Edit Write Read Glob Grep TodoWrite NotebookEdit Task WebFetch WebSearch'
          branch_prefix: 'feat/dev-agent-issue-'
          show_full_output: 'true'

      # ACM gate (Pillar 1, post-agent). Runs only when phase-acm has
      # locked a manifest into the feature branch (gate_active=true).
      # Switches HEAD to the branch the agent worked on, then runs
      # acm-verify --check-green --check-locks --check-spec-hash:
      #   green       every ACM test must PASS (the agent fulfilled
      #               every criterion the spec promised)
      #   locks       SHA-256 of every ACM test file must match the
      #               manifest (anti-cheating: the agent did not
      #               weaken its own tests)
      #   spec-hash   SHA-256 of the spec must match the manifest
      #               (no silent spec edit since phase-acm ran)
      #
      # Verdict feeds the salvage step: pass → open PR as before;
      # fail → push the branch (preserve work) but skip PR open and
      # label `acm-failed` so the operator can revise + re-run.
      - name: ACM gate (verify tests green + locks intact + spec stable)
        id: acm-gate
        if: inputs.invocation_mode == 'live' && steps.acm-preflight.outputs.gate_active == 'true' && always()
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH_NAME="feat/dev-agent-issue-${ISSUE_NUMBER}"
          # Switch to whichever branch the agent left the work on.
          if git show-ref --verify --quiet "refs/heads/${BRANCH_NAME}"; then
            git switch "$BRANCH_NAME"
          fi
          if [ ! -f .dev-agent/acm-manifest.json ]; then
            # Manifest got removed by the agent — that's a hard fail.
            echo "verdict=fail" >> "$GITHUB_OUTPUT"
            echo "reason=manifest-deleted" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TEST_CMD_VAL=$(jq -r '.commands.test // "npm test"' /tmp/config.json)
          set +e
          MODE=acm-green \
          TEST_CMD="$TEST_CMD_VAL" \
          MANIFEST_PATH=.dev-agent/acm-manifest.json \
          CHECK_LOCKS=true \
          CHECK_SPEC_HASH=true \
          CHECK_MUTATION_KILLS=false \
            .dev-agent-engine/node_modules/.bin/tsx .dev-agent-engine/lib/cli/acm-verify.ts > /tmp/acm-gate.json
          STATUS=$?
          set -e
          VERDICT=$(jq -r '.verdict' /tmp/acm-gate.json)
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "exit_status=$STATUS" >> "$GITHUB_OUTPUT"

      # Self-review (Pillar 6, advisory in v1). The implement-agent is
      # asked (via prompts/implement.md) to write a structured 10-item
      # checklist verdict to .dev-agent/self-review.json plus a markdown
      # summary to .dev-agent/self-review-summary.md. This step parses
      # the JSON, posts the verdict + checklist as an issue comment, and
      # surfaces structured outputs that the salvage step uses to populate
      # the PR body. Missing/malformed JSON does NOT block the PR — it
      # logs a "self-review absent" warning. v1.1 will gate PR-open on the
      # verdict; for now, the value is in the audit trail + PR body.
      - name: Self-review verification (advisory)
        id: self-review
        if: inputs.invocation_mode == 'live' && always()
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH_NAME="feat/dev-agent-issue-${ISSUE_NUMBER}"
          if git show-ref --verify --quiet "refs/heads/${BRANCH_NAME}"; then
            git switch "$BRANCH_NAME" 2>/dev/null || true
          fi
          if [ ! -f .dev-agent/self-review.json ]; then
            echo "verdict=absent" >> "$GITHUB_OUTPUT"
            echo "summary_path=" >> "$GITHUB_OUTPUT"
            echo "Self-review JSON absent — agent did not run the self-review step (advisory)."
            exit 0
          fi
          if ! jq -e . .dev-agent/self-review.json > /dev/null 2>&1; then
            echo "verdict=malformed" >> "$GITHUB_OUTPUT"
            echo "summary_path=" >> "$GITHUB_OUTPUT"
            echo "::warning::self-review.json is not valid JSON"
            exit 0
          fi
          VERDICT=$(jq -r '.verdict' .dev-agent/self-review.json)
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          if [ -f .dev-agent/self-review-summary.md ]; then
            echo "summary_path=.dev-agent/self-review-summary.md" >> "$GITHUB_OUTPUT"
          else
            echo "summary_path=" >> "$GITHUB_OUTPUT"
          fi
          # Build a checklist breakdown: one bullet per non-pass item.
          NON_PASS=$(jq -r '[.checklist[] | select(.result != "pass") | "  - **\(.item)** (\(.result)): \(.note)"] | join("\n")' .dev-agent/self-review.json)
          if [ -n "$NON_PASS" ]; then
            BODY=$(printf '🤖 Phase: implement\nSelf-review verdict: %s\n\nNon-pass items:\n%s\n' "$VERDICT" "$NON_PASS")
          else
            BODY=$(printf '🤖 Phase: implement\nSelf-review verdict: %s — all 10 checklist items passed.\n' "$VERDICT")
          fi
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"

      # Risk-annotation audit (Pillar 5, advisory in v1). Reads the
      # agent's `.dev-agent/bash-log.jsonl` (one annotated Bash call per
      # line) and runs each entry through lib/risk-annotation.ts's
      # deterministic classifier. Advisory: a missing log or any number
      # of mismatches does NOT block the PR. v1.1 will fail-closed on
      # mismatches once typical FP rates have been audited on real PRs.
      - name: Risk-annotation audit (advisory)
        id: risk-audit
        if: inputs.invocation_mode == 'live' && always()
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH_NAME="feat/dev-agent-issue-${ISSUE_NUMBER}"
          if git show-ref --verify --quiet "refs/heads/${BRANCH_NAME}"; then
            git switch "$BRANCH_NAME" 2>/dev/null || true
          fi
          mkdir -p /tmp/risk-audit
          .dev-agent-engine/node_modules/.bin/tsx \
            .dev-agent-engine/lib/cli/risk-audit.ts \
            --log .dev-agent/bash-log.jsonl \
            --output /tmp/risk-audit/report
          VERDICT=$(jq -r '.verdict' /tmp/risk-audit/report.json)
          MISMATCHES=$(jq -r '.mismatch_count' /tmp/risk-audit/report.json)
          HIGH_RISK=$(jq -r '.high_risk_count' /tmp/risk-audit/report.json)
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "mismatch_count=$MISMATCHES" >> "$GITHUB_OUTPUT"
          echo "high_risk_count=$HIGH_RISK" >> "$GITHUB_OUTPUT"
          # Label taxonomy: risk-audit:absent | risk-audit:clean | risk-audit:mismatches.
          # Re-runs via /approve must NOT accumulate contradictory verdicts —
          # remove any prior risk-audit:* labels before applying the current
          # one so the issue reflects the latest run only. (codex P2 #2 from
          # PR #80 review.)
          for STALE in absent clean mismatches; do
            if [ "$STALE" != "$VERDICT" ]; then
              gh issue edit "$ISSUE_NUMBER" --remove-label "risk-audit:$STALE" 2>/dev/null || true
            fi
          done
          gh issue edit "$ISSUE_NUMBER" --add-label "risk-audit:$VERDICT" || true
          # Comment ONLY when there's something to surface (mismatches OR
          # classifier-HIGH calls). Clean-with-zero-HIGH runs are silent —
          # the label is enough.
          if [ "$VERDICT" = "mismatches" ] || [ "$HIGH_RISK" -gt 0 ]; then
            gh issue comment "$ISSUE_NUMBER" --body-file /tmp/risk-audit/report.md || true
          fi

      - name: ACM gate — comment + label on fail
        if: inputs.invocation_mode == 'live' && steps.acm-gate.outputs.verdict == 'fail'
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Build a structured fail summary from the JSON. The PR is NOT
          # opened in this case (salvage gates on this verdict), but the
          # branch IS pushed so the agent's work isn't lost.
          FAILED_TESTS=$(jq -r '[.tests[] | select(.result == "fail") | "  - \(.criterion_id) (\(.test_file))"] | join("\n")' /tmp/acm-gate.json)
          LOCK_MISMATCHES=$(jq -r '.locks.mismatched | join("\n  - ")' /tmp/acm-gate.json)
          SPEC_VERDICT=$(jq -r '.spec_hash.verdict' /tmp/acm-gate.json)
          SECTIONS=""
          if [ -n "$FAILED_TESTS" ]; then
            SECTIONS="${SECTIONS}\n**Failing ACM tests:**\n${FAILED_TESTS}\n"
          fi
          if [ -n "$LOCK_MISMATCHES" ] && [ "$LOCK_MISMATCHES" != "" ]; then
            SECTIONS="${SECTIONS}\n**Test-file SHA mismatches** (anti-cheating lock):\n  - ${LOCK_MISMATCHES}\n"
          fi
          if [ "$SPEC_VERDICT" = "fail" ]; then
            SECTIONS="${SECTIONS}\n**Spec SHA mismatch** — spec was edited since phase-acm ran. Use `/regenerate-acm` to rerun the gate against the current spec.\n"
          fi
          BODY=$(printf '🤖 Phase: implement\nGate: ACM\nVerdict: fail\n\nACM verification failed; PR not opened. The feature branch is preserved on `feat/dev-agent-issue-%s` so the work is not lost.%b\nFix the listed items and re-run `/approve` to retry.\n' "$ISSUE_NUMBER" "$SECTIONS")
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"
          gh issue edit "$ISSUE_NUMBER" --add-label acm-failed || true

      # Apply-audit (Pillar 4 advisory). Post-hoc TS/JS syntax validation
      # of every TS/JS file the agent touched, using the TypeScript parser
      # via lib/apply.ts's validateTsSyntax (Pillar 4's full vision —
      # search/replace blocks anchored to SHA-pinned line ranges — needs a
      # fork of claude-code-action's edit surface; this advisory v1.5 lite
      # catches the specific failure mode Pillar 4 was guarding against:
      # whole-file rewrites that pass the agent's "I edited this" check
      # but emit broken syntax). Advisory: a syntax error in a changed
      # file does NOT block the PR. The consumer's tsc step is the
      # enforcing gate; this audit's value is surfacing the issue with a
      # dedicated label + comment before tsc fails further down.
      - name: Apply-audit (TS/JS syntax of changed files)
        id: apply-audit
        if: inputs.invocation_mode == 'live' && always()
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH_NAME="feat/dev-agent-issue-${ISSUE_NUMBER}"
          if git show-ref --verify --quiet "refs/heads/${BRANCH_NAME}"; then
            git switch "$BRANCH_NAME" 2>/dev/null || true
          fi
          mkdir -p /tmp/apply-audit
          .dev-agent-engine/node_modules/.bin/tsx \
            .dev-agent-engine/lib/cli/apply-audit.ts \
            --base-ref origin/main \
            --output /tmp/apply-audit/report
          VERDICT=$(jq -r '.verdict' /tmp/apply-audit/report.json)
          ERRORS=$(jq -r '.errors | length' /tmp/apply-audit/report.json)
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "error_count=$ERRORS" >> "$GITHUB_OUTPUT"
          # Apply the verdict label regardless of value (advisory).
          # Label taxonomy: apply-audit:no-files | apply-audit:clean |
          # apply-audit:syntax-errors.
          gh issue edit "$ISSUE_NUMBER" --add-label "apply-audit:$VERDICT" || true
          # Comment on the issue ONLY when there's something to surface
          # (syntax errors). no-files / clean runs are silent — the label
          # is enough.
          if [ "$VERDICT" = "syntax-errors" ]; then
            gh issue comment "$ISSUE_NUMBER" --body-file /tmp/apply-audit/report.md || true
          fi

      # Salvage step: handles the most common implement-phase failure
      # mode — the agent does its work, creates the feature branch,
      # edits files, but ends its turn without committing/pushing/PRing.
      # The runner's filesystem (and the local branch) are then
      # destroyed at job end, so the work is lost and the issue is
      # left in state:implementing forever.
      #
      # Idempotent recovery:
      #   1. If the branch doesn't exist locally, nothing to salvage.
      #   2. If there are uncommitted changes, commit them as the
      #      workflow (the agent's own commit messages would have
      #      been more granular — surface that in the message).
      #   3. Push the branch (no-op if the agent already pushed).
      #   4. Open a PR if none exists. Requires Settings → Actions →
      #      General → "Allow GitHub Actions to create and approve
      #      pull requests" enabled on the consumer repo; if that's
      #      off, the gh pr create call 403s and we leave a hint
      #      comment so the operator knows.
      - name: Salvage agent's work (commit + push + open PR fallback)
        if: inputs.invocation_mode == 'live' && success()
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          GH_TOKEN: ${{ github.token }}
          # ACM verdict feeds the PR-open gate further down. When the gate
          # failed, we still push the branch (work preservation) but skip
          # opening the PR — the operator must revise + re-run instead.
          ACM_VERDICT: ${{ steps.acm-gate.outputs.verdict || 'skipped' }}
          # Self-review summary (when present) becomes the PR body so
          # human reviewers see the agent's own checklist verdict before
          # diving into the diff.
          SELF_REVIEW_SUMMARY_PATH: ${{ steps.self-review.outputs.summary_path }}
        run: |
          set -euo pipefail
          BRANCH_NAME="feat/dev-agent-issue-${ISSUE_NUMBER}"

          if ! git show-ref --verify --quiet "refs/heads/${BRANCH_NAME}"; then
            echo "Agent did not create local branch ${BRANCH_NAME}; nothing to salvage."
            exit 0
          fi

          git switch "$BRANCH_NAME"

          # `git status --porcelain` covers all three of:
          #   - staged    (` M` /  `A `)
          #   - unstaged  (`M ` / ` D`)
          #   - untracked (`??`)
          # The previous version used `git diff` checks which silently
          # missed untracked-only changes — the most common
          # "agent stopped before commit" case (the agent did
          # `mkdir foo && write foo/x.ts`, never staged anything,
          # exited). Workflow artifacts (issue.json, .dev-agent-engine/)
          # are kept out of this scan via .git/info/exclude registered
          # earlier in the job.
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name 'dev-agent[bot]'
            git config user.email 'dev-agent@users.noreply.github.com'
            git add -A
            git commit -m "feat(dev-agent): implement issue #${ISSUE_NUMBER} (workflow-finalized)" \
              -m "The agent ran to end_turn without committing its changes. The implement workflow's salvage step finalized them so the agent's work isn't lost. Review the diff carefully — the agent's own commit messages would have been more granular."
            echo "Salvage: committed uncommitted agent changes."
          fi

          # Push the branch. No-op if agent already pushed.
          git push -u origin "$BRANCH_NAME" 2>&1 || {
            echo "::warning::push to origin/${BRANCH_NAME} failed; the next telemetry step will report agent-no-pr."
            exit 0
          }

          # PR-open gate (Pillar 1). When the ACM gate failed, skip opening
          # the PR — the operator must address the failing tests / lock
          # mismatches / spec drift first, then re-run /approve. The
          # branch is preserved on origin so the work isn't lost; the
          # ACM-gate step has already labeled the issue `acm-failed` and
          # commented with the failure breakdown.
          if [ "$ACM_VERDICT" = "fail" ]; then
            echo "Salvage: ACM gate failed; branch pushed but PR not opened."
            exit 0
          fi

          # Open a PR if missing. The follow-up "Comment telemetry +
          # flip state" step relies on a PR existing to declare
          # success; if pr create 403s here, it'll fall through to
          # agent-no-pr which is the right signal that this consumer
          # repo needs the "Allow Actions to create PRs" setting on.
          if ! gh pr view "$BRANCH_NAME" >/dev/null 2>&1; then
            # Use the agent's self-review summary as PR body when present,
            # falling back to the generic salvage notice. The summary is
            # the agent's own checklist verdict per Pillar 6.
            if [ -n "$SELF_REVIEW_SUMMARY_PATH" ] && [ -f "$SELF_REVIEW_SUMMARY_PATH" ]; then
              PR_BODY=$(printf 'Closes #%s.\n\n## Agent self-review\n\n%s\n' "$ISSUE_NUMBER" "$(cat "$SELF_REVIEW_SUMMARY_PATH")")
            else
              PR_BODY=$(printf 'Closes #%s.\n\nAuto-opened by the dev-agent implement workflow salvage step. Review the diff before merging — the agent did not finalize the PR itself, so commit messages may be coarse.' "$ISSUE_NUMBER")
            fi
            if ! gh pr create --head "$BRANCH_NAME" --title "feat: implement issue #${ISSUE_NUMBER} — ${ISSUE_TITLE}" --body "$PR_BODY" 2>&1; then
              HINT_BODY=$(printf '🛟 Workflow pushed the agent work to `%s` but could not open the PR. Most likely cause: Settings → Actions → General → "Allow GitHub Actions to create and approve pull requests" is disabled on this repo. Enable it and re-trigger, or open a PR from `%s` manually.' "$BRANCH_NAME" "$BRANCH_NAME")
              gh issue comment "$ISSUE_NUMBER" --body "$HINT_BODY"
            fi
          fi

      - name: Comment telemetry + flip state
        id: telemetry
        if: inputs.invocation_mode == 'live'
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH_NAME="feat/dev-agent-issue-${ISSUE_NUMBER}"
          # The agent both pushes the branch and opens the PR (workflow-default
          # GH_TOKEN cannot create PRs unless the repo opts in via "Allow
          # GitHub Actions to create and approve pull requests" — the agent's
          # OIDC token doesn't have that restriction).
          PR_NUMBER=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -z "$PR_NUMBER" ]; then
            BODY=$(printf '🤖 Phase: implement\nModel: claude-sonnet-4-6\nMode: live\nStatus: agent-no-pr (the agent ran but did not open a PR; check logs)\n')
            gh issue comment "$ISSUE_NUMBER" --body "$BODY"
            echo "phase_outcome=blocked" >> "$GITHUB_OUTPUT"
            echo "pr_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BODY=$(printf '🤖 Phase: implement\nModel: claude-sonnet-4-6\nMode: live\nStatus: success\nBranch: %s\nPR: #%s\n' "$BRANCH_NAME" "$PR_NUMBER")
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"
          gh issue edit "$ISSUE_NUMBER" --remove-label state:implementing --add-label state:pr-review || true
          echo "phase_outcome=success" >> "$GITHUB_OUTPUT"
          echo "pr_url=https://github.com/${GITHUB_REPOSITORY}/pull/${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Append SESSION_LOG.md entry
        if: always() && inputs.invocation_mode == 'live'
        env:
          PHASE: implement
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          OUTCOME: ${{ steps.telemetry.outputs.phase_outcome || 'aborted' }}
          PR_URL: ${{ steps.telemetry.outputs.pr_url }}
          NEXT_SESSION_HINT: ${{ steps.telemetry.outputs.phase_outcome == 'success' && 'review the PR against the agreed scope and merge to default branch (= staging) when ready.' || 'inspect the implement-phase logs and decide whether to retry, abandon, or hand-edit the scope.' }}
        run: |
          set -euo pipefail
          .dev-agent-engine/node_modules/.bin/tsx .dev-agent-engine/lib/cli/append-session-log.ts
          if git diff --quiet -- SESSION_LOG.md; then
            echo "SESSION_LOG.md unchanged — no commit needed."
            exit 0
          fi
          git config user.name 'dev-agent[bot]'
          git config user.email 'dev-agent@users.noreply.github.com'
          git add SESSION_LOG.md
          git commit -m "chore(dev-agent): session log — implement issue #${ISSUE_NUMBER}"
          git push origin HEAD || echo "push failed (likely a protected branch — entry is committed locally; consumer can rebase)"
