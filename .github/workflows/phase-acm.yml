name: dev-agent · phase-acm

# Phase: ACM (Acceptance-Criteria Manifest). Pillar 1 of the industry-grade
# verification architecture. Runs in `state:acm-building`, between
# `state:spec-ready` and `state:implementing`.
#
# Reads the spec, extracts the `## Acceptance criteria` bullets, generates
# failing test stubs (one per criterion) via a separate test-agent context
# (Augment's circular-validation fix), SHA-locks the manifest, and either:
#   - applies `acm-pass` (advances to state:implementing — phase-implement)
#   - applies `acm-fail` (advances to state:blocked — operator review)
#
# v1 ships in stub mode by default. The full live-agent flow lands in
# step 6b once the test-agent context-isolation surface is wired through
# claude-code-action.
#
# SECURITY: spec content is wrapped in <untrusted_content> tags before
# reaching any prompt template (see lib/untrusted-content.ts). The phase
# starts with step-security/harden-runner so unexpected egress is logged.
# All untrusted GitHub event values flow through env vars — never inlined
# into run: blocks.

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: number
      config_path:
        required: false
        type: string
        default: '.dev-agent.yml'
      invocation_mode:
        required: false
        type: string
        default: 'live'
    secrets:
      ANTHROPIC_API_KEY:
        required: false
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number'
        required: true
        type: number
      config_path:
        description: 'Path to .dev-agent.yml'
        required: false
        type: string
        default: 'examples/test-repo/.dev-agent.yml'
      invocation_mode:
        description: 'live (real test-agent — TODO step 6b) or stub (deterministic, no model)'
        required: false
        type: string
        default: 'live'

jobs:
  acm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      id-token: write
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Reserve workflow artifacts from git state
        run: |
          set -euo pipefail
          {
            echo 'issue.json'
            echo '.dev-agent-engine/'
            echo '/tmp/acm-extract.json'
          } >> .git/info/exclude

      - name: Checkout dev-agent engine
        uses: actions/checkout@v4
        with:
          repository: alizaouane/dev-agent
          ref: main
          path: .dev-agent-engine

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      - run: npm ci

      - name: Install engine deps
        working-directory: .dev-agent-engine
        run: npm ci

      - name: Convert .dev-agent.yml to JSON
        env:
          CONFIG_PATH: ${{ inputs.config_path }}
        run: |
          set -euo pipefail
          .dev-agent-engine/node_modules/.bin/tsx .dev-agent-engine/lib/cli/config-to-json.ts "$CONFIG_PATH" > /tmp/config.json
          jq -e . /tmp/config.json > /dev/null

      - name: Read issue + locate spec
        id: issue
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh issue view "$ISSUE_NUMBER" --json number,title,body,labels > issue.json
          SPECS_DIR=$(jq -r '.artifacts.specs_dir // "docs/specs"' /tmp/config.json)
          BODY=$(jq -r '.body' issue.json)
          # Same spec-path discovery as phase-implement.yml — first try
          # SPECS_DIR-prefixed, then any docs/**/*.md. No placeholder fallback
          # in phase-acm: missing spec is a hard fail.
          SPEC_PATH=$(printf '%s' "$BODY" | grep -oE "${SPECS_DIR}/[^[:space:])\"\\\`]+\.md" | head -1 || true)
          if [ -z "$SPEC_PATH" ] || [ ! -f "$SPEC_PATH" ]; then
            SPEC_PATH=$(printf '%s' "$BODY" | grep -oE "docs/[^[:space:])\"\\\`]+\.md" | while read -r p; do [ -f "$p" ] && echo "$p" && break; done || true)
          fi
          if [ -z "$SPEC_PATH" ] || [ ! -f "$SPEC_PATH" ]; then
            echo "spec_missing=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "spec_missing=false" >> "$GITHUB_OUTPUT"
          echo "spec_path=$SPEC_PATH" >> "$GITHUB_OUTPUT"

      - name: Block when spec is missing
        if: steps.issue.outputs.spec_missing == 'true'
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BODY='🤖 Phase: acm
          Verdict: blocked
          Reason: missing-spec

          Issue body must reference a spec file under `docs/specs/` (or any `docs/**/*.md` path). Add the spec link and re-run `/approve`.'
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"
          gh issue edit "$ISSUE_NUMBER" --add-label state:blocked --remove-label state:acm-building || true
          exit 1

      - name: Extract + lint acceptance criteria
        id: extract
        if: steps.issue.outputs.spec_missing != 'true'
        env:
          SPEC_PATH: ${{ steps.issue.outputs.spec_path }}
        run: |
          set -euo pipefail
          set +e
          .dev-agent-engine/node_modules/.bin/tsx .dev-agent-engine/lib/cli/acm-extract.ts > /tmp/acm-extract.json
          STATUS=$?
          set -e
          if [ ! -s /tmp/acm-extract.json ]; then
            echo "::error::acm-extract produced no output"
            exit 2
          fi
          REASON=$(jq -r '.reason // ""' /tmp/acm-extract.json)
          OK=$(jq -r '.ok' /tmp/acm-extract.json)
          echo "ok=$OK" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "extract_status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Block when extraction / lint fails
        if: steps.extract.outputs.ok == 'false'
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
          REASON: ${{ steps.extract.outputs.reason }}
        run: |
          set -euo pipefail
          ERR_LIST=$(jq -r '[.lint[] | select(.level == "error") | "  - \(.id): \(.message)"] | join("\n")' /tmp/acm-extract.json)
          if [ "$REASON" = "missing-section" ]; then
            BODY=$'🤖 Phase: acm\nVerdict: blocked\nReason: missing-section\n\nThe spec lacks a `## Acceptance criteria` section. Add the section with one criterion per `- [ ]` bullet and re-run `/approve`.'
          else
            BODY=$(printf '🤖 Phase: acm\nVerdict: blocked\nReason: lint-errors\n\nAcceptance criteria failed lint:\n%s\n\nFix the criteria (each must be observable, testable, ≥5 words, no vague terms without measurable thresholds) and re-run `/approve`.\n' "$ERR_LIST")
          fi
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"
          gh issue edit "$ISSUE_NUMBER" --add-label state:blocked --remove-label state:acm-building || true
          exit 1

      # Live mode — invoke a real test-generation agent in an isolated
      # context (Augment's circular-validation fix). The agent sees the
      # spec + criteria but is steered AWAY from reading implementation
      # files via the system prompt + restricted Bash allowlist for the
      # test-runner. The implement-agent that runs LATER must not see
      # this agent's transcript (separate workflow run = separate context
      # by construction).
      - name: Live mode — checkout / create feature branch
        if: inputs.invocation_mode == 'live' && steps.extract.outputs.ok == 'true'
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH_NAME="feat/dev-agent-issue-${ISSUE_NUMBER}"
          git config user.name 'dev-agent[bot]'
          git config user.email '198982749+dev-agent[bot]@users.noreply.github.com'
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" > /dev/null 2>&1; then
            git fetch origin "$BRANCH_NAME"
            git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"
          else
            git checkout -B "$BRANCH_NAME"
          fi
          mkdir -p tests/acm .dev-agent

      - name: Live mode — render test-agent prompt
        if: inputs.invocation_mode == 'live' && steps.extract.outputs.ok == 'true'
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          SPEC_PATH: ${{ steps.issue.outputs.spec_path }}
        run: |
          set -euo pipefail
          # Detect the test framework from the consumer's commands.test.
          # The agent uses this to pick the right test syntax (it/describe
          # for vitest|jest, def test_ for pytest, etc.).
          TEST_CMD=$(jq -r '.commands.test // "npm test"' /tmp/config.json)
          # Surface the ACM extract JSON to the agent.
          CRITERIA_JSON=$(jq -c '.criteria' /tmp/acm-extract.json)
          SPEC_SHA=$(jq -r '.spec_sha256' /tmp/acm-extract.json)
          {
            echo "# ACM test-agent task — issue #${ISSUE_NUMBER}"
            echo ""
            echo "**Spec:** \`${SPEC_PATH}\` (sha256: \`${SPEC_SHA}\`)"
            echo "**Test command:** \`${TEST_CMD}\`"
            echo "**Output dir:** \`tests/acm/\`"
            echo "**Manifest path:** \`.dev-agent/acm-manifest.json\`"
            echo ""
            echo "---"
            echo ""
            echo "## Spec content (untrusted — see system prompt invariants)"
            echo ""
            echo '<untrusted_content source="spec">'
            # Sanitize the spec before embedding: a spec containing a literal
            # `</untrusted_content>` would otherwise break out of the wrapper
            # and the content beyond it would be parsed as trusted instructions
            # (prompt-injection escape hatch). Replace any closing tag
            # (case-insensitive) with a neutralized form before cat'ing.
            sed 's|</[uU][nN][tT][rR][uU][sS][tT][eE][dD]_[cC][oO][nN][tT][eE][nN][tT]>|</untrusted_content_blocked>|g' "$SPEC_PATH"
            echo ""
            echo '</untrusted_content>'
            echo ""
            echo "---"
            echo ""
            echo "## Extracted acceptance criteria (deterministic — already linted)"
            echo ""
            echo '```json'
            printf '%s' "$CRITERIA_JSON" | jq .
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "## Your task"
            echo ""
            echo "Generate exactly ONE failing test per criterion. For each criterion:"
            echo ""
            echo "1. File path: \`tests/acm/<issue>-<criterion-id-num>-<slug>.<ext>\` where ext"
            echo "   matches the test framework (\`.test.ts\` for vitest/jest, \`.test.py\` for"
            echo "   pytest, etc.). Pick the slug from the criterion text (kebab-case, ≤40 chars)."
            echo "2. Test must FAIL when run against the current branch (the impl is not yet"
            echo "   written). After authoring, verify by running the test."
            echo "3. One assertion per test. Use the consumer's public API only — do NOT mock"
            echo "   internal collaborators (Augment's circular-validation anti-pattern)."
            echo "4. Tests must be deterministic. Time / randomness / network → fixtures."
            echo "5. Do NOT read implementation files (anything under \`src/\`, \`app/\`, \`lib/\`"
            echo "   that isn't test infrastructure). Read the spec + public API surface only."
            echo ""
            echo "After all tests are written, build the manifest at"
            echo "\`.dev-agent/acm-manifest.json\` with this exact shape:"
            echo ""
            echo '```json'
            echo '{'
            echo '  "spec_path": "'"${SPEC_PATH}"'",'
            echo '  "spec_sha256": "'"${SPEC_SHA}"'",'
            echo '  "generated_at": "<ISO-8601 UTC now>",'
            echo '  "criteria": ['
            echo '    {'
            echo '      "id": "AC-N",'
            echo '      "text": "<verbatim criterion text>",'
            echo '      "raw": "<verbatim bullet line from spec>",'
            echo '      "checked": false,'
            echo '      "test_file": "tests/acm/<file>",'
            echo '      "test_name": "AC-N: <criterion text>",'
            echo '      "test_sha256": "<SHA-256 of test file body, hex-lowercase>"'
            echo '    }'
            echo '  ]'
            echo '}'
            echo '```'
            echo ""
            echo "Compute \`test_sha256\` after writing each test file. Use \`sha256sum\` or"
            echo "node's \`crypto\` module. Do not invent the hash."
            echo ""
            echo "---"
            echo ""
            echo "## System / discipline (read carefully)"
            echo ""
            cat .dev-agent-engine/prompts/acm-test-agent.md
          } > /tmp/acm-agent-prompt.md
          echo "prompt rendered ($(wc -l < /tmp/acm-agent-prompt.md) lines)"

      - name: Live mode — install Claude Code CLI
        if: inputs.invocation_mode == 'live' && steps.extract.outputs.ok == 'true'
        run: |
          set -euo pipefail
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Live mode — run test-agent (Claude Code, isolated context)
        if: inputs.invocation_mode == 'live' && steps.extract.outputs.ok == 'true'
        id: agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: /tmp/acm-agent-prompt.md
          # Restricted tool surface. Read is broad (the agent needs to read
          # spec + tests/ existing fixtures + public types) but Bash is
          # narrowed to the test-runner + git add/commit on tests/acm/ only.
          # Edit + Write are allowed but the system prompt forbids touching
          # impl files. The downstream acm-verify --check-locks pass catches
          # any test files that the implement-agent would later mutate.
          claude_args: '--max-turns 80 --model claude-sonnet-4-6 --allowedTools Read Write Edit Glob Grep Bash(npm test:*) Bash(npx vitest:*) Bash(pytest:*) Bash(git add tests/acm/*) Bash(git add .dev-agent/*) Bash(sha256sum:*) Bash(node:*)'
          show_full_output: 'true'

      - name: Live mode — verify ACM manifest + tests are red
        if: inputs.invocation_mode == 'live' && steps.extract.outputs.ok == 'true'
        id: verify-red
        env:
          REPO_ROOT: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if [ ! -f .dev-agent/acm-manifest.json ]; then
            echo "::error::test-agent did not produce .dev-agent/acm-manifest.json"
            echo "verdict=fail" >> "$GITHUB_OUTPUT"
            echo "reason=manifest-missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # TEST_CMD source of truth: .dev-agent.yml via /tmp/config.json.
          # The previous env-block binding to `steps.config.outputs.test_cmd`
          # always fell back to the default (the convert-config step has no
          # id + no $GITHUB_OUTPUT writes), masking config errors silently.
          TEST_CMD=$(jq -r '.commands.test // "npm test --"' /tmp/config.json)
          set +e
          MODE=acm-red MANIFEST_PATH=.dev-agent/acm-manifest.json TEST_CMD="$TEST_CMD" \
            .dev-agent-engine/node_modules/.bin/tsx .dev-agent-engine/lib/cli/acm-verify.ts \
            > /tmp/acm-verify-red.json
          STATUS=$?
          set -e
          VERDICT=$(jq -r '.verdict' /tmp/acm-verify-red.json 2>/dev/null || echo 'fail')
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "0" ] || [ "$VERDICT" != "pass" ]; then
            echo "reason=red-check-failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Live mode — block when verification failed
        if: inputs.invocation_mode == 'live' && steps.extract.outputs.ok == 'true' && steps.verify-red.outputs.verdict != 'pass'
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
          REASON: ${{ steps.verify-red.outputs.reason }}
        run: |
          set -euo pipefail
          DETAIL='(see workflow logs)'
          if [ -s /tmp/acm-verify-red.json ]; then
            DETAIL=$(jq -r '[.tests[] | select(.result == "fail") | "  - \(.criterion_id) (\(.test_file)): \(.details // "")"] | join("\n")' /tmp/acm-verify-red.json | head -c 1500)
          fi
          BODY=$(printf '🤖 Phase: acm\nVerdict: blocked\nMode: live\nReason: %s\n\nLive test-agent did not produce all-red ACM tests. Detail:\n\n```\n%s\n```\n\nFix: re-run after the test-agent's run completes; or fall back to `invocation_mode: stub` for verification of the wiring only.' "$REASON" "$DETAIL")
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"
          gh issue edit "$ISSUE_NUMBER" --add-label state:blocked --remove-label state:acm-building || true
          exit 1

      - name: Live mode — commit + push manifest + tests
        if: inputs.invocation_mode == 'live' && steps.extract.outputs.ok == 'true' && steps.verify-red.outputs.verdict == 'pass'
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          BRANCH_NAME="feat/dev-agent-issue-${ISSUE_NUMBER}"
          # Branch was created earlier in the live-mode flow; agent may have
          # already committed. If so, this is a no-op. If not, commit now.
          git add .dev-agent/acm-manifest.json tests/acm/
          if ! git diff --cached --quiet; then
            git commit -m "chore(acm): generate manifest + tests (live mode) for issue #${ISSUE_NUMBER}"
          fi
          git push -u origin "$BRANCH_NAME"

      - name: Apply acm-pass transition (live mode)
        if: inputs.invocation_mode == 'live' && steps.extract.outputs.ok == 'true' && steps.verify-red.outputs.verdict == 'pass'
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          COUNT=$(jq '.criteria | length' /tmp/acm-extract.json)
          BODY=$(printf '🤖 Phase: acm\nVerdict: pass\nMode: live\n\nLive test-agent generated %s failing test(s) bound to acceptance criteria. Manifest at `.dev-agent/acm-manifest.json` (SHA-locked). Advancing to `state:implementing` — implementation agent will turn these tests green.\n' "$COUNT")
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"
          gh issue edit "$ISSUE_NUMBER" --add-label state:implementing --remove-label state:acm-building || true

      - name: Stub-mode — generate fake manifest + stub tests
        id: stub
        if: inputs.invocation_mode == 'stub' && steps.extract.outputs.ok == 'true'
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          SPEC_PATH: ${{ steps.issue.outputs.spec_path }}
        run: |
          set -euo pipefail
          mkdir -p .dev-agent tests/acm
          .dev-agent-engine/node_modules/.bin/tsx .dev-agent-engine/lib/cli/acm-stub-build.ts \
            --extract /tmp/acm-extract.json \
            --issue "$ISSUE_NUMBER" \
            --spec "$SPEC_PATH" \
            --manifest .dev-agent/acm-manifest.json \
            --tests-dir tests/acm

      - name: Commit + push manifest + stub tests
        if: steps.stub.outcome == 'success'
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH_NAME="feat/dev-agent-issue-${ISSUE_NUMBER}"
          git config user.name 'dev-agent[bot]'
          git config user.email '198982749+dev-agent[bot]@users.noreply.github.com'
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" > /dev/null 2>&1; then
            git fetch origin "$BRANCH_NAME"
            git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"
          else
            git checkout -B "$BRANCH_NAME"
          fi
          git add .dev-agent/acm-manifest.json tests/acm/
          if ! git diff --cached --quiet; then
            git commit -m "chore(acm): generate manifest + stub tests for issue #${ISSUE_NUMBER}"
            git push -u origin "$BRANCH_NAME"
          fi

      - name: Apply acm-pass transition (stub mode)
        if: inputs.invocation_mode == 'stub' && steps.extract.outputs.ok == 'true'
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          COUNT=$(jq '.criteria | length' /tmp/acm-extract.json)
          BODY=$(printf '🤖 Phase: acm\nVerdict: pass\nMode: stub\n\nStub manifest written to `.dev-agent/acm-manifest.json` with %s criteria. Stub tests committed under `tests/acm/`. Advancing to `state:implementing`.\n' "$COUNT")
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"
          gh issue edit "$ISSUE_NUMBER" --add-label state:implementing --remove-label state:acm-building || true
