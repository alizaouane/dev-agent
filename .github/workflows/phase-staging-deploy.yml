name: dev-agent · phase-staging-deploy

# Phase 2c: after a dev-agent PR merges, run the consumer's
# `deploy_skills.staging` chain and the smoke command. The agent invokes
# each skill in declared order, captures stdout/stderr, and stops on the
# first failure. The workflow flips the issue label from
# state:pr-review → state:staging-deployed when the deploy succeeds, or
# state:blocked otherwise.

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: number
      config_path:
        required: false
        type: string
        default: '.dev-agent.yml'
      invocation_mode:
        required: false
        type: string
        default: 'live'
    secrets:
      ANTHROPIC_API_KEY:
        required: false
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number'
        required: true
        type: number
      config_path:
        description: 'Path to .dev-agent.yml'
        required: false
        type: string
        default: 'examples/test-repo/.dev-agent.yml'
      invocation_mode:
        description: 'live (real claude-code-action) or stub (no agent — for tests)'
        required: false
        type: string
        default: 'live'

jobs:
  staging-deploy:
    runs-on: ubuntu-latest
    # See phase-implement.yml for rationale on the long ceiling.
    timeout-minutes: 360
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      # Consumer repo at root.
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      # Engine repo with the dev-agent CLIs + prompt templates this
      # workflow invokes. See phase-implement.yml for rationale.
      - name: Checkout dev-agent engine
        uses: actions/checkout@v4
        with:
          repository: alizaouane/dev-agent
          ref: v1
          path: .dev-agent-engine

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      - run: npm ci

      - name: Install engine deps
        working-directory: .dev-agent-engine
        run: npm ci

      - name: Convert .dev-agent.yml to JSON for jq
        env:
          CONFIG_PATH: ${{ inputs.config_path }}
        run: |
          set -euo pipefail
          .dev-agent-engine/node_modules/.bin/tsx .dev-agent-engine/lib/cli/config-to-json.ts "$CONFIG_PATH" > /tmp/config.json
          jq -e . /tmp/config.json > /dev/null

      - name: Render system prompt
        id: prompt
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          MERGE_SHA: ${{ github.sha }}
          CONFIG_PATH: ${{ inputs.config_path }}
        run: |
          set -euo pipefail
          # The consumer root is the directory containing .dev-agent.yml.
          # The agent will cd there before running any skill so scripts/
          # and .claude/skills/ resolve correctly.
          CONSUMER_ROOT=$(dirname "$CONFIG_PATH")
          [ "$CONSUMER_ROOT" = "." ] && CONSUMER_ROOT=""
          export PROMPT_VARS_JSON=$(jq -nc \
            --arg consumer_root "$CONSUMER_ROOT" \
            --argjson skills "$(jq -c '.deploy_skills.staging // []' /tmp/config.json)" \
            --arg staging "$(jq -r '.branches.staging // ""' /tmp/config.json)" \
            --arg test "$(jq -r '.commands.test // "npm test"' /tmp/config.json)" \
            --arg sha "$MERGE_SHA" \
            '{consumer_root:(if ($consumer_root|length) > 0 then $consumer_root else "." end), deploy_skills:{staging:$skills}, branches:{staging:(if ($staging|length) > 0 then $staging else null end)}, commands:{test:$test}, merge_sha:$sha}')
          if [ -z "$PROMPT_VARS_JSON" ]; then
            echo "::error::PROMPT_VARS_JSON is empty — jq filter produced no output" >&2
            exit 1
          fi
          .dev-agent-engine/node_modules/.bin/tsx .dev-agent-engine/lib/cli/render-prompt.ts staging-deploy > /tmp/system-prompt.md

      - name: Read issue title
        id: issue
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Build agent prompt
        id: build
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          MERGE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          {
            echo "# Staging deploy task — issue #$ISSUE_NUMBER"
            echo ""
            echo "**Issue title:** $ISSUE_TITLE"
            echo "**Merge SHA:** \`$MERGE_SHA\`"
            echo ""
            echo "---"
            echo ""
            echo "## System / discipline (read carefully)"
            echo ""
            cat /tmp/system-prompt.md
          } > /tmp/agent-prompt.md
          echo "prompt_path=/tmp/agent-prompt.md" >> "$GITHUB_OUTPUT"

      - name: Skip live agent invocation (stub mode)
        if: inputs.invocation_mode == 'stub'
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BODY=$(printf '🤖 Phase: staging-deploy\nModel: (none)\nMode: stub\nStatus: stub-mode (no agent invocation; set invocation_mode=live to run deploy)\n')
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"

      # See phase-implement.yml — claude-code-action needs the binary
      # pre-installed at ~/.local/bin/claude.
      - name: Install Claude Code CLI
        if: inputs.invocation_mode == 'live'
        run: |
          set -euo pipefail
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Claude Code (live agent)
        id: claude
        if: inputs.invocation_mode == 'live'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ steps.build.outputs.prompt_path }}
          claude_args: '--max-turns 500 --model claude-sonnet-4-6 --allowedTools Bash Read Glob Grep TodoWrite WebFetch'
          show_full_output: 'true'

      - name: Parse agent JSON + comment telemetry + flip state
        id: parse
        if: inputs.invocation_mode == 'live'
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          EXEC_FILE: ${{ steps.claude.outputs.execution_file }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # claude-execution-output.json is a JSON array of message events
          # (see anthropics/claude-code-action base-action/src/run-claude-sdk.ts).
          # The result event is the last entry: {type: "result", result: "..."}.
          # The result string contains the agent's final markdown including
          # the ```json ... ``` fenced block from prompts/staging-deploy.md.
          # awk between the fences handles nested braces in deploy_artifacts;
          # a regex like \{[^{}]*\} would silently reject the nested array.
          # Use jq's `last` rather than `tail -1` — the result string is
          # multiline (includes the agent's prose plus the fenced JSON),
          # so `tail -1` would collapse to a trailing blank.
          RESULT_TEXT=$(jq -r '[.[] | select(.type=="result") | .result // empty] | last // ""' "$EXEC_FILE" 2>/dev/null || echo "")
          AGENT_JSON=$(printf '%s' "$RESULT_TEXT" | awk '/```json/{flag=1;next} /```/{flag=0} flag' | tr -d '\n')
          [ -z "$AGENT_JSON" ] && AGENT_JSON='{}'
          SMOKE_PASSING=$(printf '%s' "$AGENT_JSON" | jq -r '.smoke_passing // false' 2>/dev/null || echo "false")
          DEPLOYS=$(printf '%s' "$AGENT_JSON" | jq -r '.deploys_completed // 0' 2>/dev/null || echo "0")
          SUMMARY=$(printf '%s' "$AGENT_JSON" | jq -r '.summary // "(no summary)"' 2>/dev/null || echo "(parse failed)")
          if [ "$SMOKE_PASSING" = "true" ]; then
            STATUS="success"
            NEW_LABEL="state:staging-deployed"
            OUTCOME="success"
            HINT="manual smoke on staging, then promote to prod when ready."
          else
            STATUS="failed (smoke or deploy did not pass)"
            NEW_LABEL="state:blocked"
            OUTCOME="blocked"
            HINT="inspect deploy/smoke logs, fix the regression, re-run staging-deploy."
          fi
          BODY=$(printf '🤖 Phase: staging-deploy\nModel: claude-sonnet-4-6\nMode: live\nStatus: %s\nDeploys completed: %s\nSmoke passing: %s\nSummary: %s\nMerge SHA: %s\n' "$STATUS" "$DEPLOYS" "$SMOKE_PASSING" "$SUMMARY" "${GITHUB_SHA}")
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"
          gh issue edit "$ISSUE_NUMBER" --remove-label state:pr-review --add-label "$NEW_LABEL" || true
          echo "phase_outcome=${OUTCOME}" >> "$GITHUB_OUTPUT"
          echo "next_hint=${HINT}" >> "$GITHUB_OUTPUT"

      - name: Append SESSION_LOG.md entry
        if: always() && inputs.invocation_mode == 'live'
        env:
          PHASE: staging-deploy
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          OUTCOME: ${{ steps.parse.outputs.phase_outcome || 'aborted' }}
          NEXT_SESSION_HINT: ${{ steps.parse.outputs.next_hint || 'inspect the staging-deploy run logs.' }}
          TRIGGER: 'PR merged to default branch — staging deploy + smoke verify run.'
        run: |
          set -euo pipefail
          .dev-agent-engine/node_modules/.bin/tsx .dev-agent-engine/lib/cli/append-session-log.ts
          if git diff --quiet -- SESSION_LOG.md; then
            echo "SESSION_LOG.md unchanged — no commit needed."
            exit 0
          fi
          git config user.name 'dev-agent[bot]'
          git config user.email 'dev-agent@users.noreply.github.com'
          git add SESSION_LOG.md
          git commit -m "chore(dev-agent): session log — staging-deploy issue #${ISSUE_NUMBER}"
          git push origin HEAD || echo "push failed (likely a protected branch — entry is committed locally; consumer can rebase)"
