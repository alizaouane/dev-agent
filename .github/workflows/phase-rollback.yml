name: dev-agent · phase-rollback

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: number
      config_path:
        required: false
        type: string
        default: '.dev-agent.yml'
      invocation_mode:
        required: false
        type: string
        default: 'stub'
    secrets:
      ANTHROPIC_API_KEY:
        required: false
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number'
        required: true
        type: number
      config_path:
        description: 'Path to .dev-agent.yml'
        required: false
        type: string
        default: 'examples/test-repo/.dev-agent.yml'
      invocation_mode:
        description: 'stub or live'
        required: false
        type: string
        default: 'stub'

jobs:
  rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      # Pillar 5 — Harden runner against unexpected egress + sudo. See
      # phase-bug-scout.yml for the v1 audit-mode rationale.
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Checkout dev-agent engine
        uses: actions/checkout@v4
        with:
          repository: alizaouane/dev-agent
          ref: main
          path: .dev-agent-engine
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Install engine deps
        working-directory: .dev-agent-engine
        run: npm ci

      - name: Identify merge commit
        id: merge
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR=$(gh issue view "$ISSUE_NUMBER" --json comments | jq -r '.comments[].body' | grep -oE 'PR: #[0-9]+' | head -1 | grep -oE '[0-9]+' || true)
          if [ -z "$PR" ]; then echo "no PR linked from issue" >&2; exit 1; fi
          SHA=$(gh pr view "$PR" --json mergeCommit --jq .mergeCommit.oid)
          echo "pr=$PR" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Convert .dev-agent.yml to JSON for jq
        env:
          CONFIG_PATH: ${{ inputs.config_path }}
        run: |
          set -euo pipefail
          .dev-agent-engine/node_modules/.bin/tsx .dev-agent-engine/lib/cli/config-to-json.ts "$CONFIG_PATH" > /tmp/config.json
          jq -e . /tmp/config.json > /dev/null

      - name: Render rollback prompt
        env:
          MODEL: claude-sonnet-4-6
          INVOCATION_MODE: ${{ inputs.invocation_mode }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          PR_NUMBER: ${{ steps.merge.outputs.pr }}
        run: |
          set -euo pipefail
          # Pull every prompt var from the consumer's `.dev-agent.yml`
          # rather than hardcoding stubs. Specifically:
          # - `scaffold_skills.migration` lets the agent dual-resolve a
          #   custom migration scaffold skill (e.g. when migrations
          #   aren't under `supabase/migrations/`).
          # - `branches.staging` / `branches.release_target` may be
          #   `null` / `"main"` / `"develop"` etc. depending on the
          #   consumer's branching model.
          # - `deploy_skills.{staging,prod}` carry the redeploy chain
          #   the rollback runs after the revert PR merges.
          export PROMPT_VARS_JSON=$(jq -nc \
            --argjson issue "$ISSUE_NUMBER" \
            --argjson pr "$PR_NUMBER" \
            --arg staging "$(jq -r '.branches.staging // ""' /tmp/config.json)" \
            --arg target "$(jq -r '.branches.release_target // "main"' /tmp/config.json)" \
            --argjson dskstaging "$(jq -c '.deploy_skills.staging // []' /tmp/config.json)" \
            --argjson dskprod "$(jq -c '.deploy_skills.prod // []' /tmp/config.json)" \
            --arg sksmigration "$(jq -r '.scaffold_skills.migration // ""' /tmp/config.json)" \
            --arg test "$(jq -r '.commands.test // "npm test"' /tmp/config.json)" \
            '{issue_number:$issue, merged_pr:$pr, branches:{staging:(if ($staging|length) > 0 then $staging else null end), release_target:$target}, deploy_skills:{staging:$dskstaging, prod:$dskprod}, scaffold_skills:{migration:$sksmigration}, commands:{test:$test}}')
          .dev-agent-engine/node_modules/.bin/tsx .dev-agent-engine/lib/cli/render-and-run.ts rollback

      - name: Append SESSION_LOG.md entry
        if: always() && inputs.invocation_mode == 'live'
        env:
          PHASE: rollback
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          OUTCOME: rolled_back
          TRIGGER: 'Rollback dispatched — reverting the merge of the implement-phase PR.'
          NEXT_SESSION_HINT: 'investigate the regression that caused the rollback before retrying the implement phase.'
          DEFERRED: 'Identify root cause from staging-deploy / smoke logs.'
        run: |
          set -euo pipefail
          .dev-agent-engine/node_modules/.bin/tsx .dev-agent-engine/lib/cli/append-session-log.ts
          if git diff --quiet -- SESSION_LOG.md; then
            echo "SESSION_LOG.md unchanged — no commit needed."
            exit 0
          fi
          git config user.name 'dev-agent[bot]'
          git config user.email 'dev-agent@users.noreply.github.com'
          git add SESSION_LOG.md
          git commit -m "chore(dev-agent): session log — rollback issue #${ISSUE_NUMBER}"
          git push origin HEAD || echo "push failed (likely a protected branch — entry is committed locally; consumer can rebase)"
