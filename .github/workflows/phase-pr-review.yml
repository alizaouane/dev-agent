name: dev-agent · phase-pr-review

# Phase 2b: when a reviewer (human or bot) mentions `@claude` on a dev-agent
# authored PR, the agent reads the comment, addresses it on the same branch,
# and pushes the fix. Closes the implement → review → fix → merge loop.
#
# Triggered events:
#   - issue_comment.created — top-level PR comments (PRs are issues to GH)
#   - pull_request_review_comment.created — inline file comments
#   - pull_request_review.submitted — top-level review with body
#
# Filter: only PRs whose head branch matches `feat/dev-agent-issue-*`
# (everything the dev-agent ships) AND the comment/review body contains
# `@claude`. Other PRs and other comments are ignored.
#
# SECURITY: Comment/review/branch text is NEVER interpolated into `run:`
# blocks via ${{ ... }}. All untrusted strings flow exclusively through
# environment variables, and the only run block (Resolve PR head branch)
# operates on the PR number (an integer) and the head ref (validated by
# regex before use).

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

jobs:
  pr-review:
    if: |
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '@claude') &&
        github.event.comment.user.login != 'claude[bot]'
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        github.event.comment.user.login != 'claude[bot]'
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        github.event.review.user.login != 'claude[bot]'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      # Pillar 5 — Harden runner against unexpected egress + sudo. See
      # phase-bug-scout.yml for the v1 audit-mode rationale.
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true
      - name: Resolve PR head branch
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          set -euo pipefail
          HEAD=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')
          # Strict regex gate: only dev-agent-authored PRs proceed. The head
          # ref came from GH but we still validate it against a known-safe
          # shape before using it as a checkout ref or echoing it back.
          if ! [[ "$HEAD" =~ ^feat/dev-agent-issue-[0-9]+$ ]]; then
            echo "PR head branch is not a dev-agent branch; exiting." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.pr.outputs.skip != 'true'
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head }}

      - name: Run Claude Code (live agent)
        if: steps.pr.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # No explicit prompt — claude-code-action's auto-detected
          # `agent` mode reads the PR + triggering comment automatically.
          claude_args: '--max-turns 30 --model claude-sonnet-4-6 --allowedTools Bash Edit Write Read Glob Grep TodoWrite NotebookEdit Task WebFetch WebSearch'
          show_full_output: 'true'

  # /swarm-override — Pillar 2 escape hatch.
  # When a swarm-review verdict is `swarm-fail` and a human reviewer
  # decides to advance the PR anyway (false positive, urgent fix, etc.),
  # they comment `/swarm-override <one-line reason>` on the PR. This
  # job clears the swarm-review:fail label, applies swarm-overridden +
  # swarm-review:pass, and posts an audit comment with a hidden machine-
  # parseable `<!-- dev-agent:event ... -->` anchor that mirrors the
  # `override.applied` event from `lib/events.ts`. Future tooling can
  # scrape these anchors to reconstruct `.dev-agent/events/<pr>.jsonl`
  # without needing a commit-back step from the workflow.
  #
  # The action is privileged but advisory until step 16 finishes the
  # canary→enforce rollout. Once branch protection requires the
  # `verification-gate` check (per `docs/runbooks/2026-05-16-swarm-review-enforcement.md`),
  # this override becomes the sole path forward when a reviewer dissents.
  swarm-override:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/swarm-override') &&
      github.event.comment.user.login != 'claude[bot]' &&
      github.event.comment.user.login != 'dev-agent[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Resolve PR head branch + extract reason
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
          ACTOR: ${{ github.event.comment.user.login }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          HEAD=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')
          if ! [[ "$HEAD" =~ ^feat/dev-agent-issue-[0-9]+$ ]]; then
            echo "Not a dev-agent PR; exiting."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Extract everything after the literal `/swarm-override` token
          # as the operator's free-form reason. Body is in env so no shell
          # interpolation. We don't enforce min length in v1 (advisory) —
          # an empty reason is allowed, just less useful in the audit log.
          REASON=$(printf '%s' "$COMMENT_BODY" | sed -E 's|^/swarm-override[[:space:]]*||' | head -c 500)
          if [ -z "$REASON" ]; then
            REASON="(no reason given)"
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          # Use a delimiter for multi-line reason in step output.
          {
            echo "reason<<EOF_REASON"
            printf '%s\n' "$REASON"
            echo "EOF_REASON"
          } >> "$GITHUB_OUTPUT"

      - name: Apply override + post audit comment with event anchor
        if: steps.ctx.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
          ACTOR: ${{ github.event.comment.user.login }}
          REASON: ${{ steps.ctx.outputs.reason }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          gh pr edit "$PR_NUMBER" --remove-label 'swarm-review:fail' || true
          gh pr edit "$PR_NUMBER" --remove-label 'swarm-review:concern' || true
          gh pr edit "$PR_NUMBER" --add-label 'swarm-overridden' || true
          gh pr edit "$PR_NUMBER" --add-label 'swarm-review:pass' || true
          TS=$(date -u -Iseconds)
          # Build the audit event JSON with jq for safe escaping of REASON
          # (user-supplied — may contain quotes, backslashes, newlines). The
          # anchor `<!-- dev-agent:event {json} -->` lets future tooling
          # reconstruct .dev-agent/events/<pr>.jsonl by scraping PR comments —
          # PR comments are durable in a way the runner filesystem and 90-day
          # artifacts are not.
          EVENT_JSON=$(jq -nc \
            --arg ts "$TS" \
            --arg run_id "$RUN_ID" \
            --argjson issue "$PR_NUMBER" \
            --arg actor "$ACTOR" \
            --arg reason "$REASON" \
            '{ts:$ts, run_id:$run_id, issue:$issue, phase:"phase-pr-review", event:"override.applied", payload:{override_type:"swarm-override", actor:$actor, reason:$reason}}')
          BODY=$(printf '🛟 swarm-override applied\n\n**Actor:** @%s\n**Reason:** %s\n**Timestamp:** %s\n\nThe swarm-review verdict has been manually overridden. The PR may now advance to human review. The original verdict comment remains visible above for context.\n\n<!-- dev-agent:event %s -->\n' "$ACTOR" "$REASON" "$TS" "$EVENT_JSON")
          gh pr comment "$PR_NUMBER" --body "$BODY"
